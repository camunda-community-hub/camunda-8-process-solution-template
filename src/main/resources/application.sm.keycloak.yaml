camunda:
  client:
    mode: self-managed
    tenant-ids:
      - <default>
    auth:
      issuer: https://my-domain-name/auth/realms/camunda-platform
      client-id: xxx
      client-secret: xxx
    zeebe:
      enabled: true
      grpc-address: https://my-domain-name
      rest-address: https://my-domain-name/rest
      prefer-rest-over-grpc: false
      audience: zeebe-api
      scope: # optional
